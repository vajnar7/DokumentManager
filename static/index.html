<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation Manager</title>
    <link rel="stylesheet" href="static/css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <!-- Login/Register Section -->
    <div id="auth-section" class="auth-container">
        <div class="auth-form-wrapper">
            <h1>Documentation Manager</h1>
            
            <!-- Login Form -->
            <div id="login-form-div" class="auth-form active">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username:</label>
                        <input type="text" id="login-username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password:</label>
                        <input type="password" id="login-password" name="password" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
                <p class="auth-toggle">Don't have an account? <a href="#" id="show-register-link">Register here</a></p>
            </div>

            <!-- Register Form (hidden by default) -->
            <div id="register-form-div" class="auth-form" style="display: none;">
                <h2>Register</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label for="register-username">Username:</label>
                        <input type="text" id="register-username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password:</label>
                        <input type="password" id="register-password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password-confirm">Confirm Password:</label>
                        <input type="password" id="register-password-confirm" name="password_confirm" required>
                    </div>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
                <p class="auth-toggle">Already have an account? <a href="#" id="show-login-link">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Main Application Section (hidden until logged in) -->
    <div id="app-section" class="container" style="display: none;">
        <div class="header">
            <h1>Documentation Manager</h1>
            <div class="user-info">
                <span id="current-username"></span>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <input type="text" id="search-input" placeholder="Search documents...">
            <button id="search-btn">Search</button>
            <button id="clear-search-btn">Clear</button>
        </div>

        <!-- Add Document Form -->
        <div class="form-section">
            <h2>Add New Document</h2>
            <form id="add-document-form">
                <div class="form-group">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="sector">Sector:</label>
                    <select id="sector" name="sector">
                        <option value="">Select Sector</option>
                        <option value="IT">IT</option>
                        <option value="Kotlovnica">Kotlovnica</option>
                        <option value="Elektricarji">Elektricarji</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="content">Content:</label>
                    <textarea id="content" name="content" rows="5" required></textarea>
                </div>
                <button type="submit">Add Document</button>
            </form>
        </div>

        <!-- Edit Document Modal (hidden by default) -->
        <div id="edit-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Edit Document</h2>
                <form id="edit-document-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label for="edit-title">Title:</label>
                        <input type="text" id="edit-title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-sector">Sector:</label>
                        <select id="edit-sector" name="sector">
                            <option value="">Select Sector</option>
                            <option value="IT">IT</option>
                            <option value="Kotlovnica">Kotlovnica</option>
                            <option value="Elektricarji">Elektricarji</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-content">Content:</label>
                        <textarea id="edit-content" name="content" rows="5" required></textarea>
                    </div>
                    <button type="submit">Update Document</button>
                </form>
            </div>
        </div>

        <!-- Documents List -->
        <div class="documents-section">
            <h2>Documents</h2>
            <div id="documents-list"></div>
        </div>
    </div>

    <script src="static/js/app.js"></script>
</body>
</html>
